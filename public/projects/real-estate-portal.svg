<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0a1414"/>
  <rect width="800" height="500" fill="url(#bg)" opacity="0.12"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500"><stop offset="0%" stop-color="#2c3e50"/><stop offset="100%" stop-color="#1a252f"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3498db"/><stop offset="100%" stop-color="#2980b9"/></linearGradient>
  </defs>

  <!-- Browser window -->
  <rect x="50" y="60" width="700" height="380" rx="12" fill="#0d1818" stroke="#2a3a3a" stroke-width="1.5"/>
  <!-- Browser chrome -->
  <rect x="50" y="60" width="700" height="40" rx="12" fill="#1a2828"/>
  <rect x="50" y="90" width="700" height="10" fill="#1a2828"/>
  <circle cx="75" cy="80" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="90" cy="80" r="5" fill="#f1c40f" opacity="0.6"/>
  <circle cx="105" cy="80" r="5" fill="#2ecc71" opacity="0.6"/>

  <!-- Nav bar -->
  <rect x="60" y="108" width="200" height="30" rx="6" fill="#1a2828"/>
  <rect x="60" y="108" width="200" height="30" rx="6" fill="url(#accent)" opacity="0.08"/>
  <rect x="75" y="118" width="50" height="5" rx="2.5" fill="#3498db" opacity="0.5"/>
  <rect x="135" y="118" width="40" height="5" rx="2.5" fill="#3a4a4a"/>
  <rect x="185" y="118" width="40" height="5" rx="2.5" fill="#3a4a4a"/>
  <rect x="235" y="118" width="40" height="5" rx="2.5" fill="#3a4a4a"/>

  <!-- Hero banner -->
  <rect x="60" y="150" width="680" height="120" rx="8" fill="url(#accent)" opacity="0.08"/>
  <rect x="80" y="165" width="250" height="8" rx="4" fill="#3498db" opacity="0.5"/>
  <rect x="80" y="182" width="350" height="6" rx="3" fill="#3a4a4a"/>
  <rect x="80" y="195" width="280" height="6" rx="3" fill="#3a4a4a"/>
  <rect x="80" y="218" width="140" height="30" rx="15" fill="url(#accent)" opacity="0.3"/>

  <!-- Search bar -->
  <rect x="300" y="210" width="200" height="28" rx="14" fill="#0a1414" stroke="#2a3a3a" stroke-width="1"/>
  <rect x="315" y="219" width="60" height="5" rx="2.5" fill="#2a3a3a"/>
  <circle cx="480" cy="224" r="7" fill="#3498db" opacity="0.4"/>

  <!-- Property cards grid -->
  <!-- Card 1 -->
  <rect x="60" y="285" width="200" height="135" rx="8" fill="#1a2828" stroke="#2a3a3a" stroke-width="0.5"/>
  <rect x="60" y="285" width="200" height="80" rx="8" fill="url(#accent)" opacity="0.06"/>
  <!-- House icon in card -->
  <rect x="130" y="305" width="18" height="14" rx="2" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.5"/>
  <polyline points="128,310 139,300 150,310" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.5"/>
  <rect x="145" y="375" width="90" height="4" rx="2" fill="#3a4a4a"/>
  <rect x="145" y="385" width="60" height="3" rx="1.5" fill="#2a3a3a"/>
  <rect x="145" y="395" width="40" height="12" rx="6" fill="#3498db" opacity="0.3"/>
  <!-- Price -->
  <rect x="72" y="372" width="50" height="5" rx="2.5" fill="#3498db" opacity="0.5"/>
  <rect x="72" y="382" width="70" height="4" rx="2" fill="#3a4a4a"/>
  <rect x="72" y="392" width="35" height="3" rx="1.5" fill="#2a3a3a"/>

  <!-- Card 2 -->
  <rect x="275" y="285" width="200" height="135" rx="8" fill="#1a2828" stroke="#2a3a3a" stroke-width="0.5"/>
  <rect x="275" y="285" width="200" height="80" rx="8" fill="url(#accent)" opacity="0.04"/>
  <rect x="345" y="305" width="18" height="14" rx="2" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.4"/>
  <polyline points="343,310 354,300 365,310" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.4"/>
  <rect x="360" y="375" width="90" height="4" rx="2" fill="#3a4a4a"/>
  <rect x="360" y="385" width="60" height="3" rx="1.5" fill="#2a3a3a"/>
  <rect x="360" y="395" width="40" height="12" rx="6" fill="#3498db" opacity="0.3"/>
  <rect x="287" y="372" width="50" height="5" rx="2.5" fill="#3498db" opacity="0.5"/>
  <rect x="287" y="382" width="70" height="4" rx="2" fill="#3a4a4a"/>
  <rect x="287" y="392" width="35" height="3" rx="1.5" fill="#2a3a3a"/>

  <!-- Card 3 -->
  <rect x="490" y="285" width="200" height="135" rx="8" fill="#1a2828" stroke="#2a3a3a" stroke-width="0.5"/>
  <rect x="490" y="285" width="200" height="80" rx="8" fill="url(#accent)" opacity="0.05"/>
  <rect x="560" y="305" width="18" height="14" rx="2" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.45"/>
  <polyline points="558,310 569,300 580,310" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.45"/>
  <rect x="575" y="375" width="90" height="4" rx="2" fill="#3a4a4a"/>
  <rect x="575" y="385" width="60" height="3" rx="1.5" fill="#2a3a3a"/>
  <rect x="575" y="395" width="40" height="12" rx="6" fill="#3498db" opacity="0.3"/>
  <rect x="502" y="372" width="50" height="5" rx="2.5" fill="#3498db" opacity="0.5"/>
  <rect x="502" y="382" width="70" height="4" rx="2" fill="#3a4a4a"/>
  <rect x="502" y="392" width="35" height="3" rx="1.5" fill="#2a3a3a"/>

  <!-- Pagination dots -->
  <circle cx="370" cy="435" r="4" fill="#3498db" opacity="0.5"/>
  <circle cx="390" cy="435" r="4" fill="#2a3a3a"/>
  <circle cx="410" cy="435" r="4" fill="#2a3a3a"/>

  <!-- Bottom text -->
  <text x="400" y="470" font-family="Inter, sans-serif" font-size="10" fill="#2a3a3a" text-anchor="middle" letter-spacing="2">PORTAL INMOBILIARIO · WORDPRESS · TEMA ADAPTADO</text>
</svg>
