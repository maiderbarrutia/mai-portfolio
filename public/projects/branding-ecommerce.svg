<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0a1414"/>
  <rect width="800" height="500" fill="url(#bg)" opacity="0.12"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500"><stop offset="0%" stop-color="#00a292"/><stop offset="100%" stop-color="#004d45"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00c4b0"/><stop offset="100%" stop-color="#008a7a"/></linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2828"/><stop offset="100%" stop-color="#0f1a1a"/></linearGradient>
  </defs>

  <!-- Monitor / Screen -->
  <rect x="80" y="100" width="280" height="200" rx="12" fill="#1a2828" stroke="#2a3a3a" stroke-width="1.5"/>
  <rect x="95" y="115" width="250" height="155" rx="4" fill="#0d1818"/>
  <rect x="95" y="115" width="250" height="155" rx="4" fill="url(#accent)" opacity="0.08"/>
  <!-- Screen content - abstract layout -->
  <rect x="110" y="130" width="60" height="8" rx="4" fill="url(#accent)" opacity="0.6"/>
  <rect x="180" y="130" width="40" height="8" rx="4" fill="#2a3a3a"/>
  <rect x="110" y="150" width="220" height="3" rx="1.5" fill="#1a2828"/>
  <!-- Grid items -->
  <rect x="110" y="165" width="65" height="55" rx="6" fill="url(#accent)" opacity="0.15"/>
  <rect x="185" y="165" width="65" height="55" rx="6" fill="url(#accent)" opacity="0.1"/>
  <rect x="260" y="165" width="65" height="55" rx="6" fill="url(#accent)" opacity="0.08"/>
  <!-- Grid lines inside items -->
  <rect x="118" y="173" width="30" height="4" rx="2" fill="url(#accent)" opacity="0.4"/>
  <rect x="118" y="183" width="48" height="3" rx="1.5" fill="#2a3a3a"/>
  <rect x="118" y="192" width="48" height="3" rx="1.5" fill="#2a3a3a"/>
  <!-- Stand -->
  <rect x="195" y="300" width="50" height="15" rx="2" fill="#1a2828"/>
  <rect x="175" y="315" width="90" height="8" rx="4" fill="#1a2828"/>

  <!-- Brand mark / Logo abstract -->
  <circle cx="540" cy="150" r="35" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <circle cx="540" cy="150" r="20" fill="url(#accent)" opacity="0.15"/>
  <path d="M525 150 Q540 130 555 150 Q540 170 525 150Z" fill="url(#accent)" opacity="0.6"/>
  <text x="540" y="210" font-family="Inter, sans-serif" font-size="13" fill="#a8b8b8" text-anchor="middle" letter-spacing="3">BRAND</text>

  <!-- Packaging / Box -->
  <g transform="translate(450, 250)">
    <rect x="0" y="20" width="160" height="120" rx="6" fill="url(#box)" stroke="#2a3a3a" stroke-width="1.5"/>
    <rect x="0" y="20" width="160" height="120" rx="6" fill="url(#accent)" opacity="0.05"/>
    <!-- Box lid line -->
    <line x1="0" y1="55" x2="160" y2="55" stroke="#2a3a3a" stroke-width="1"/>
    <!-- Abstract branding on box -->
    <rect x="30" y="30" width="40" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
    <rect x="30" y="48" width="18" height="4" rx="2" fill="#2a3a3a"/>
    <circle cx="110" cy="36" r="10" fill="url(#accent)" opacity="0.2"/>
    <circle cx="110" cy="36" r="5" fill="url(#accent)" opacity="0.3"/>
    <!-- Bottom text -->
    <rect x="25" y="100" width="110" height="6" rx="3" fill="#2a3a3a"/>
    <rect x="35" y="112" width="90" height="4" rx="2" fill="#1f3030"/>
    <!-- Barcode -->
    <rect x="25" y="80" width="2" height="12" rx="0" fill="#2a3a3a"/>
    <rect x="29" y="80" width="1" height="12" rx="0" fill="#2a3a3a"/>
    <rect x="32" y="80" width="3" height="12" rx="0" fill="#2a3a3a"/>
    <rect x="37" y="80" width="1" height="12" rx="0" fill="#2a3a3a"/>
    <rect x="40" y="80" width="2" height="12" rx="0" fill="#2a3a3a"/>
    <rect x="44" y="80" width="1" height="12" rx="0" fill="#2a3a3a"/>
  </g>

  <!-- Color palette dots -->
  <circle cx="490" cy="430" r="6" fill="#00c4b0"/>
  <circle cx="510" cy="430" r="6" fill="#2d8a7a"/>
  <circle cx="530" cy="430" r="6" fill="#1a5a50"/>
  <circle cx="550" cy="430" r="6" fill="#e8a040"/>
  <circle cx="570" cy="430" r="6" fill="#404040"/>

  <!-- Typography sample -->
  <text x="400" y="465" font-family="Inter, sans-serif" font-size="10" fill="#2a3a3a" text-anchor="middle" letter-spacing="2">IDENTIDAD CORPORATIVA · PACKAGING · ECOMMERCE</text>
</svg>
