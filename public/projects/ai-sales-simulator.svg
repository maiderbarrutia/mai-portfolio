<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0a1414"/>
  <rect width="800" height="500" fill="url(#bg)" opacity="0.12"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500"><stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#2d1b69"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a29bfe"/><stop offset="100%" stop-color="#6c5ce7"/></linearGradient>
    <linearGradient id="msg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#4a3ba8"/></linearGradient>
    <linearGradient id="msg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a2828"/><stop offset="100%" stop-color="#0f1a1a"/></linearGradient>
  </defs>

  <!-- Chat interface -->
  <rect x="80" y="80" width="360" height="360" rx="16" fill="#0d1818" stroke="#2a3a3a" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="80" y="80" width="360" height="60" rx="16" fill="#1a2828"/>
  <rect x="80" y="120" width="360" height="20" fill="#1a2828"/>
  <circle cx="110" cy="110" r="16" fill="url(#accent)" opacity="0.3"/>
  <circle cx="110" cy="110" r="8" fill="url(#accent)" opacity="0.6"/>
  <rect x="135" y="102" width="80" height="6" rx="3" fill="#a8b8b8" opacity="0.6"/>
  <rect x="135" y="113" width="50" height="4" rx="2" fill="#3a4a4a"/>

  <!-- Messages -->
  <!-- User message -->
  <rect x="100" y="155" width="200" height="40" rx="12" fill="url(#msg1)" opacity="0.15"/>
  <rect x="100" y="155" width="200" height="40" rx="12" fill="url(#msg1)" opacity="0.08"/>
  <rect x="110" y="166" width="140" height="5" rx="2.5" fill="url(#accent)" opacity="0.5"/>
  <rect x="110" y="177" width="100" height="5" rx="2.5" fill="url(#accent)" opacity="0.35"/>

  <!-- AI response -->
  <rect x="280" y="210" width="140" height="55" rx="12" fill="url(#msg2)" stroke="#2a3a3a" stroke-width="1"/>
  <rect x="290" y="220" width="100" height="4" rx="2" fill="#a8b8b8" opacity="0.4"/>
  <rect x="290" y="230" width="80" height="4" rx="2" fill="#a8b8b8" opacity="0.3"/>
  <rect x="290" y="240" width="110" height="4" rx="2" fill="#a8b8b8" opacity="0.35"/>
  <rect x="290" y="250" width="60" height="4" rx="2" fill="#a8b8b8" opacity="0.25"/>

  <!-- User message 2 -->
  <rect x="100" y="280" width="180" height="40" rx="12" fill="url(#msg1)" opacity="0.12"/>
  <rect x="110" y="291" width="120" height="5" rx="2.5" fill="url(#accent)" opacity="0.4"/>
  <rect x="110" y="302" width="90" height="5" rx="2.5" fill="url(#accent)" opacity="0.3"/>

  <!-- AI response 2 -->
  <rect x="260" y="335" width="160" height="55" rx="12" fill="url(#msg2)" stroke="#2a3a3a" stroke-width="1"/>
  <rect x="270" y="345" width="120" height="4" rx="2" fill="#a8b8b8" opacity="0.4"/>
  <rect x="270" y="355" width="90" height="4" rx="2" fill="#a8b8b8" opacity="0.3"/>
  <rect x="270" y="365" width="130" height="4" rx="2" fill="#a8b8b8" opacity="0.35"/>
  <rect x="270" y="375" width="70" height="4" rx="2" fill="#a8b8b8" opacity="0.25"/>

  <!-- Input bar -->
  <rect x="90" y="405" width="260" height="24" rx="12" fill="#0a1414" stroke="#2a3a3a" stroke-width="1"/>
  <rect x="100" y="412" width="100" height="4" rx="2" fill="#2a3a3a"/>
  <circle cx="335" cy="417" r="8" fill="url(#accent)" opacity="0.5"/>

  <!-- Right side: Analytics / Dashboard preview -->
