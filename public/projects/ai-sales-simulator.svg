  <rect x="610" y="95" width="95" height="50" rx="8" fill="#1a2828"/>
  <rect x="620" y="103" width="25" height="4" rx="2" fill="#3a4a4a"/>
  <text x="620" y="130" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="url(#accent)">+20%</text>

  <!-- Chart area -->
  <rect x="495" y="160" width="210" height="120" rx="8" fill="#1a2828"/>
  <!-- Line chart -->
  <polyline points="505,260 530,240 555,250 580,220 605,230 630,200 655,210 680,180 695,190" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <polyline points="505,260 530,245 555,240 580,225 605,215 630,195 655,185 680,170 695,175" fill="none" stroke="#a29bfe" stroke-width="1.5" opacity="0.3"/>
  <!-- X axis -->
  <line x1="505" y1="265" x2="695" y2="265" stroke="#2a3a3a" stroke-width="1"/>
  <rect x="505" y="273" width="4" height="2" rx="1" fill="#2a3a3a"/>
  <rect x="555" y="273" width="4" height="2" rx="1" fill="#2a3a3a"/>
  <rect x="605" y="273" width="4" height="2" rx="1" fill="#2a3a3a"/>
  <rect x="655" y="273" width="4" height="2" rx="1" fill="#2a3a3a"/>

  <!-- Bottom metrics -->
  <rect x="495" y="295" width="210" height="45" rx="8" fill="#1a2828"/>
  <rect x="505" y="303" width="60" height="4" rx="2" fill="#3a4a4a"/>
  <rect x="505" y="313" width="80" height="4" rx="2" fill="#3a4a4a"/>
  <rect x="505" y="323" width="40" height="4" rx="2" fill="#3a4a4a"/>

  <!-- User avatars bottom -->
  <rect x="495" y="355" width="210" height="70" rx="8" fill="#1a2828"/>
  <rect x="505" y="363" width="80" height="4" rx="2" fill="#3a4a4a"/>
  <circle cx="515" cy="388" r="10" fill="#2a3a3a"/>
  <circle cx="540" cy="388" r="10" fill="#2a3a3a"/>
  <circle cx="565" cy="388" r="10" fill="#2a3a3a"/>
  <circle cx="590" cy="388" r="10" fill="#2a3a3a"/>
  <circle cx="615" cy="388" r="10" fill="#2a3a3a"/>
  <circle cx="640" cy="388" r="10" fill="#2a3a3a" opacity="0.5"/>
  <text x="652" y="392" font-family="Inter, sans-serif" font-size="9" fill="#5a6a6a">+3</text>

  <!-- Bottom text -->
  <text x="300" y="475" font-family="Inter, sans-serif" font-size="10" fill="#2a3a3a" text-anchor="middle" letter-spacing="2">SIMULADOR CON IA · ROLE PLAYS · MÉTRICAS</text>
</svg>
